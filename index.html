<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Notes Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    --bg: #f5f0e8;
    --surface: #fffef9;
    --green: #2d6a2d;
    --green-light: #e8f5e8;
    --yellow: #f5c842;
    --yellow-light: #fffbe6;
    --pink: #e8476a;
    --pink-light: #ffeef2;
    --teal: #2a9d8f;
    --teal-light: #e8f7f5;
    --text: #1a1a1a;
    --muted: #666;
    --border: #ddd;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 24px; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--green);
    letter-spacing: -1px;
  }
  .logo span { color: var(--pink); }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    position: relative;
  }
  .search-box input {
    padding: 10px 16px 10px 40px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--surface);
    width: 220px;
    transition: border-color 0.2s;
  }
  .search-box input:focus { outline: none; border-color: var(--green); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
  }

  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: #1e4d1e; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,106,45,0.3); }
  .btn-danger { background: var(--pink); color: white; }
  .btn-danger:hover { background: #c73355; }
  .btn-ghost { background: transparent; border: 2px solid var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: var(--green); color: var(--green); }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }
  .stat { background: var(--surface); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    overflow: hidden;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }

  .card-accent { height: 5px; }
  .accent-green { background: var(--green); }
  .accent-yellow { background: var(--yellow); }
  .accent-pink { background: var(--pink); }
  .accent-teal { background: var(--teal); }

  .card-body { padding: 18px; flex: 1; }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 17px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .card-phone {
    font-size: 15px;
    font-weight: 500;
    color: var(--green);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-green { background: var(--green-light); color: var(--green); }
  .tag-yellow { background: var(--yellow-light); color: #8a6e00; }
  .tag-pink { background: var(--pink-light); color: var(--pink); }
  .tag-teal { background: var(--teal-light); color: var(--teal); }

  .card-notes {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    border-top: 1px solid #f0f0f0;
    padding-top: 10px;
    margin-top: 10px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    border-top: 1px solid #f5f5f5;
    background: #fafaf8;
  }
  .card-actions .btn { font-size: 12px; padding: 6px 12px; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border-radius: 16px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  }

  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    line-height: 1;
    border-radius: 4px;
  }
  .modal-close:hover { color: var(--pink); }

  .modal-body { padding: 0 24px 24px; }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: white;
    transition: border-color 0.2s;
    color: var(--text);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--green);
  }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding-top: 8px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    z-index: 200;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    box-shadow: 0 8px 24px rgba(45,106,45,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .color-picks {
    display: flex;
    gap: 10px;
  }
  .color-pick {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform 0.15s;
  }
  .color-pick:hover { transform: scale(1.2); }
  .color-pick.selected { border-color: var(--text); }
  .cp-green { background: var(--green); }
  .cp-yellow { background: var(--yellow); }
  .cp-pink { background: var(--pink); }
  .cp-teal { background: var(--teal); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">sticky<span>notes</span> CRM</div>
    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search contacts..." oninput="renderCards()">
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Add Contact</button>
    </div>
  </header>

  <div class="stats-bar">
    <span class="stat" id="totalStat">0 contacts</span>
    <span class="stat" id="apptStat">0 with appointments</span>
    <span class="stat" id="dobStat">0 with DOB</span>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Contact</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="fName" placeholder="e.g. Danny Parker">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Phone</label>
          <input type="text" id="fPhone" placeholder="000-000-0000">
        </div>
        <div class="field">
          <label>Date of Birth</label>
          <input type="text" id="fDob" placeholder="MM/DD/YY">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>State</label>
          <input type="text" id="fState" placeholder="e.g. TX, AR, WY">
        </div>
        <div class="field">
          <label>Appointment</label>
          <input type="text" id="fAppt" placeholder="e.g. 9:30AM Tues">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Height</label>
          <input type="text" id="fHeight" placeholder='e.g. 5&apos;11"'>
        </div>
        <div class="field">
          <label>Weight</label>
          <input type="text" id="fWeight" placeholder="e.g. 165lb">
        </div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Any additional notes from sticky..."></textarea>
      </div>
      <div class="field">
        <label>Card Color</label>
        <div class="color-picks">
          <div class="color-pick cp-green selected" data-color="green" onclick="selectColor(this)"></div>
          <div class="color-pick cp-yellow" data-color="yellow" onclick="selectColor(this)"></div>
          <div class="color-pick cp-pink" data-color="pink" onclick="selectColor(this)"></div>
          <div class="color-pick cp-teal" data-color="teal" onclick="selectColor(this)"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveContact()">Save Contact</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let editingId = null;
let selectedColor = 'green';
let nextId = 200;

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('grid');
  const filtered = contacts.filter(c =>
    (c.name || '').toLowerCase().includes(q) ||
    (c.phone || '').includes(q) ||
    (c.notes || '').toLowerCase().includes(q) ||
    (c.state || '').toLowerCase().includes(q)
  );

  document.getElementById('totalStat').textContent = contacts.length + ' contacts';
  document.getElementById('apptStat').textContent = contacts.filter(c => c.appt).length + ' with appointments';
  document.getElementById('dobStat').textContent = contacts.filter(c => c.dob).length + ' with DOB';

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><h3>No contacts found</h3><p>Try a different search or add a new contact.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(c => {
    const tags = [];
    if (c.state) tags.push(`<span class="tag tag-green">${c.state}</span>`);
    if (c.appt) tags.push(`<span class="tag tag-yellow">📅 ${c.appt}</span>`);
    if (c.dob) tags.push(`<span class="tag tag-teal">DOB: ${c.dob}</span>`);
    if (c.height || c.weight) tags.push(`<span class="tag tag-pink">${[c.height, c.weight].filter(Boolean).join(' / ')}</span>`);

    return `
    <div class="card">
      <div class="card-accent accent-${c.color}"></div>
      <div class="card-body">
        <div class="card-name">${c.name || '<em style="color:#aaa;font-weight:400">Unknown</em>'}</div>
        <div class="card-phone">${c.phone ? `<a href="tel:${c.phone.replace(/\D/g,'')}" style="color:var(--green);text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">📞 ${c.phone}</a>` : '—'}</div>
        ${tags.length ? `<div class="card-meta">${tags.join('')}</div>` : ''}
        ${c.notes ? `<div class="card-notes">${c.notes}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost" onclick="editContact(${c.id})">✏️ Edit</button>
        <button class="btn btn-danger" onclick="deleteContact(${c.id})">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id = null) {
  editingId = id;
  const modal = document.getElementById('modalOverlay');
  modal.classList.remove('hidden');

  if (id) {
    const c = contacts.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = 'Edit Contact';
    document.getElementById('fName').value = c.name || '';
    document.getElementById('fPhone').value = c.phone || '';
    document.getElementById('fDob').value = c.dob || '';
    document.getElementById('fState').value = c.state || '';
    document.getElementById('fAppt').value = c.appt || '';
    document.getElementById('fHeight').value = c.height || '';
    document.getElementById('fWeight').value = c.weight || '';
    document.getElementById('fNotes').value = c.notes || '';
    selectColorByName(c.color);
  } else {
    document.getElementById('modalTitle').textContent = 'New Contact';
    ['fName','fPhone','fDob','fState','fAppt','fHeight','fWeight','fNotes'].forEach(id => document.getElementById(id).value = '');
    selectColorByName('green');
  }
}

function editContact(id) { openModal(id); }

function deleteContact(id) {
  if (!confirm('Delete this contact?')) return;
  contacts = contacts.filter(c => c.id !== id);
  renderCards();
  showToast('Contact deleted');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  editingId = null;
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function selectColor(el) {
  document.querySelectorAll('.color-pick').forEach(cp => cp.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
}

function selectColorByName(name) {
  document.querySelectorAll('.color-pick').forEach(cp => {
    cp.classList.toggle('selected', cp.dataset.color === name);
  });
  selectedColor = name;
}

function saveContact() {
  const data = {
    name: document.getElementById('fName').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    dob: document.getElementById('fDob').value.trim(),
    state: document.getElementById('fState').value.trim(),
    appt: document.getElementById('fAppt').value.trim(),
    height: document.getElementById('fHeight').value.trim(),
    weight: document.getElementById('fWeight').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    color: selectedColor,
  };

  if (!data.phone && !data.name) {
    alert('Please enter at least a name or phone number.');
    return;
  }

  if (editingId) {
    const idx = contacts.findIndex(c => c.id === editingId);
    contacts[idx] = { ...contacts[idx], ...data };
    showToast('Contact updated ✓');
  } else {
    contacts.push({ id: nextId++, ...data });
    showToast('Contact added ✓');
  }

  closeModal();
  renderCards();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderCards();
